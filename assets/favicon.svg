<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#2D2A6E"/>
  <!-- gold candlesticks: a small dip then a taller rise -->
  <g stroke="#C8A04A" stroke-width="3.5" stroke-linecap="round">
    <line x1="20" y1="20" x2="20" y2="46"/>
    <line x1="44" y1="14" x2="44" y2="40"/>
  </g>
  <rect x="15.5" y="30" width="9" height="12" rx="2" fill="#C8A04A"/>
  <rect x="39.5" y="20" width="9" height="14" rx="2" fill="#F2D38A"/>
  <!-- rising tick -->
  <path d="M14 44 L28 36 L40 41 L52 22" fill="none" stroke="#FBFAF7"
        stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>
</svg>
